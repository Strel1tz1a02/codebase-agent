<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codebase-agent</title>
    <link rel="stylesheet" href="/ui/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="项目和会话">
        <div class="brand">
          <div>
            <h1>codebase-agent</h1>
            <p id="apiStatus">正在检查 API</p>
          </div>
          <button id="newSessionButton" class="icon-button" type="button" title="新会话" aria-label="新会话">+</button>
        </div>

        <form id="projectForm" class="project-form">
          <input id="projectName" name="name" placeholder="项目名称" autocomplete="off" required />
          <input id="repoPath" name="repo_path" placeholder="仓库路径" autocomplete="off" required />
          <button type="submit">创建项目</button>
        </form>

        <div class="nav-section">
          <div class="nav-heading">项目</div>
          <div id="projectList" class="project-list" aria-live="polite"></div>
        </div>

        <div class="nav-section">
          <div class="nav-heading">会话</div>
          <div id="sessionList" class="session-list" aria-live="polite"></div>
        </div>
      </aside>
      <div id="sidebarResizer" class="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="调整边栏宽度"></div>

      <section class="chat" aria-label="代码库问答">
        <header class="chat-header">
          <div>
            <h2 id="projectStatus">未选择项目</h2>
            <p id="sessionStatus">选择项目后查看或创建会话</p>
          </div>
          <div class="header-actions">
            <span id="indexStatus" class="status-pill">not_indexed</span>
            <button id="indexButton" type="button">建立索引</button>
          </div>
        </header>

        <div id="conversation" class="conversation" aria-live="polite"></div>

        <form id="askForm" class="composer">
          <input id="question" name="question" placeholder="询问这个代码库" autocomplete="off" required />
          <button type="submit">发送</button>
        </form>
      </section>

      <aside class="inspector" aria-label="检查器">
        <div class="panel-heading">
          <h2>检查器</h2>
        </div>
        <dl class="details">
          <dt>项目</dt>
          <dd id="detailProject">-</dd>
          <dt>项目 ID</dt>
          <dd id="detailProjectId">-</dd>
          <dt>仓库</dt>
          <dd id="detailRepo">-</dd>
          <dt>会话</dt>
          <dd id="detailSession">-</dd>
          <dt>运行</dt>
          <dd id="detailRun">-</dd>
        </dl>
        <h3>运行事件</h3>
        <div id="events" class="events"></div>
      </aside>
    </main>

    <script src="/ui/static/app.js"></script>
  </body>
</html>
